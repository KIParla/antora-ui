name: Release UI Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npx gulp bundle

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-bundle
          path: build/ui-bundle.zip

      - name: Publish to GitHub Releases (latest)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Delete existing 'latest' release and tag if present
            try {
              const { data: rel } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner, repo: context.repo.repo, tag: 'latest'
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner, repo: context.repo.repo, release_id: rel.id
              });
            } catch {}
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner, repo: context.repo.repo, ref: 'tags/latest'
              });
            } catch {}

            // Create fresh 'latest' release
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: 'latest',
              name: 'Latest UI bundle',
              body: `Built from commit ${context.sha.slice(0, 7)}`,
              draft: false,
              prerelease: false,
            });

            // Upload bundle asset
            const bundle = fs.readFileSync('build/ui-bundle.zip');
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'ui-bundle.zip',
              data: bundle,
            });
